<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aguamala — Poema 1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }

    /* Imagen de fondo (olas + Guardia Nacional + carta náutica) */
    .scene > img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }

    /* ── Rectángulo del poema ───────────────────────────────────────────────
       Posición tomada del diseño original 1920x1080:
         x: 11.7% (225px) → 88.6% (1702px)   |   y inicio: 4.2% (45px)
       Se usan porcentajes/vw para que escale igual que la imagen.
    ──────────────────────────────────────────────────────────────────────── */
    .poem-box {
      position: absolute;
      left:  11.7%;
      top:    4.2%;
      width: 76.9%;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.62rem, 1.46vw, 1.5rem);
      line-height: 1.45;
      color: #235862;
      text-align: justify;
      text-justify: inter-word;
      background: transparent;
    }

    /* Efecto Line-by-line reveal por grupos definidos: las palabras siguen
       en línea (para conservar el justificado de la muestra) y se revelan en
       el orden de los 24 grupos del poema; el retraso se asigna por grupo. */
    .poem-box .w {
      opacity: 0;
      filter: blur(5px);
      transition:
        opacity 0.6s ease,
        filter  0.6s ease;
    }
    .poem-box.revealed .w {
      opacity: 1;
      filter: blur(0);
    }
    /* 13ª línea del poema en cursiva */
    .poem-box .it { font-style: italic; }

    /* Botón timón (idéntico al resto de la serie: blanco con sombra) */
    .helm {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 999;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
    .helm:hover {
      transform: rotate(30deg) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .helm:focus-visible {
      outline: 2px dashed rgba(255,255,255,0.7);
      outline-offset: 5px;
      border-radius: 50%;
    }
    .helm.go {
      animation: helmGo 0.55s ease forwards;
    }
    @keyframes helmGo {
      to { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .poem-box .w { transition: none; opacity: 1; filter: none; }
      .helm { transition: none; }
    }
  </style>

  de dieciocho a veintitrés años

  buenas calificaciones, instituciones religiosas,
-->

<script>
  // Poema dividido en los 24 grupos de revelado (en orden de lectura).
  // El bloque sigue siendo un flujo continuo y justificado (igual que la
  // muestra); cada grupo aparece un segundo después del anterior.
  const grupos = [
    "Acapulco abierto sobre el mar",
    "buques sue\u00f1os",
    "dorado el sol dorada la bruma",
    "mar del pac\u00edfico promesa mar negro tent\u00e1culos",
    "cubierta la ciudad se fractura",
    "muros que no albergan paisajes de polvo",
    "despojo vivir como tantos naufragios",
    "perderse perder el rumbo sentir que todo esfuerzo es vano",
    "migrar proceso lento supervivencia",
    "identidad dolorosa identidad profunda",
    "reconstruir resignificar un nuevo puerto",
    "espacio material espacio interior narrar narrar narrar",
    "heridas de violencia estructural",
    "verbalizar soy hija del caos",
    "la serpiente me mira a la cara escucha pregunta \u00bfconozco su identidad?",
    "huele mi miedo esqueletos de edificios",
    "vecinos secuestros toques de queda",
    "abrazos familiares escondidos en el ba\u00f1o mientras acalla el plomo",
    "afuera se persiguen casquillos en la jardinera casas de seguridad",
    "el pap\u00e1 de tu amigo acribillado afuera de su negocio negocios quemados",
    "alguien pinta alguien resiste",
    "medusas en la isla ni\u00f1os que huyen",
    "mapas linternas campamentos",
    "el oc\u00e9ano es libertad pero tambi\u00e9n es encierro"
  ];

  const ITALIC_GROUP = 12;  // \u00edndice 0-based de la 13\u00aa l\u00ednea
  const STEP = 1000;        // ms entre cada grupo (un segundo)

  const box  = document.getElementById('poem');
  const frag = document.createDocumentFragment();

  grupos.forEach((grupo, gi) => {
    const palabras = grupo.split(/\s+/);
    palabras.forEach((palabra, wi) => {
      const span = document.createElement('span');
      span.className = 'w' + (gi === ITALIC_GROUP ? ' it' : '');
      span.textContent = palabra;
      span.style.transitionDelay = (gi * STEP) + 'ms';
      frag.appendChild(span);
      if (wi < palabras.length - 1) frag.appendChild(document.createTextNode(' '));
    });
    if (gi < grupos.length - 1) frag.appendChild(document.createTextNode(' '));
  });
  box.appendChild(frag);

  // Dispara el revelado, grupo por grupo
  requestAnimationFrame(() => {
    requestAnimationFrame(() => box.classList.add('revealed'));
  });

  // Timón → siguiente página
  document.getElementById('helmBtn').addEventListener('click', function () {
    this.classList.add('go');
    setTimeout(() => { window.location.href = 'page3.html'; }, 500);
  });
</script>
