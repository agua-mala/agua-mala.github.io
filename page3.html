<!DOCTYPE html>

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aguamala — Armas y amor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .helm {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 999;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
    .helm:hover {
      transform: rotate(30deg) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .helm:focus-visible {
      outline: 2px dashed rgba(255,255,255,0.7);
      outline-offset: 5px;
      border-radius: 50%;
    }
    .helm.go {
      animation: helmGo 0.55s ease forwards;
    }
    @keyframes helmGo {
      to { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }
  </style>

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const img    = new Image();

  function draw() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const iw = img.naturalWidth,  ih = img.naturalHeight;
    const cw = canvas.width,      ch = canvas.height;
    const scale = Math.max(cw / iw, ch / ih);
    const dw = iw * scale,  dh = ih * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

    ctx.drawImage(img, dx, dy, dw, dh);
  }

  img.onload = () => {
    draw();
    window.addEventListener('resize', draw);
  };
  img.src = DATA;

  document.getElementById('helmBtn').addEventListener('click', function () {
    this.classList.add('go');
    setTimeout(() => { window.location.href = 'page4.html'; }, 500);
  });
</script>
