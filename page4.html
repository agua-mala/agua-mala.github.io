<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aguamala — Supervivencia</title>

  <!-- Tipografía Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Lienzo de diseño 1920x1080 escalado para caber SIEMPRE completo en la
       ventana (así nunca se recorta el texto, que era el error anterior). */
    .stage {
      position: absolute;
      left: 50%; top: 50%;
      width: 1920px; height: 1080px;
      transform-origin: center center;
      background: #000;
    }

    /* Fondo: la ola de la muestra (sin el texto incrustado, para no duplicarlo
       con el texto animado). Ocupa el lienzo exactamente igual que el diseño. */
    .stage > img.bg {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      display: block;
    }

    /* Bloque del poema, a la izquierda como en la muestra */
    .poem {
      position: absolute;
      left: 65px;
      top: 168px;
      width: 1300px;
      font-family: 'Roboto', Arial, Helvetica, sans-serif;
      font-size: 19px;
      line-height: 28px;
      color: #275763;
      z-index: 5;
    }
    .poem .ln {
      display: block;
      white-space: nowrap;
      /* Revelado line-by-line */
      opacity: 0;
      filter: blur(6px);
      transition: opacity 0.6s ease, filter 0.6s ease;
    }
    .poem.revealed .ln { opacity: 1; filter: blur(0); }
    .poem .ln.it { font-style: italic; }      /* 1ª línea (pregunta) en cursiva */
    .poem .ln i  { font-style: italic; }       /* tramos en cursiva de la 8ª línea */
    .poem .ln.gap-sm { margin-bottom: 11px; }  /* leve hueco tras la pregunta */
    .poem .ln.gap-lg { margin-top: 39px; }     /* renglón en blanco entre estrofas */

    @media (prefers-reduced-motion: reduce) {
      .poem .ln { opacity: 1; filter: none; transition: none; }
    }

    /* Botón timón (idéntico al resto de la serie: blanco con sombra) */
    .helm {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 999;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
    .helm:hover {
      transform: rotate(30deg) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .helm:focus-visible {
      outline: 2px dashed rgba(0,0,0,0.45);
      outline-offset: 5px;
      border-radius: 50%;
    }
    .helm.go { animation: helmGo 0.55s ease forwards; }
    @keyframes helmGo {
      to { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }
  </style>

  <!--
    ZONA DEL POEMA SECRETO
    Buenos muchachos
    IV.-
    gotas de limón caídas en la mirada
    gotas secas, muchachos buenos
    serendipity no suena
  -->

  <script>
    // Escalar el lienzo 1920x1080 para que quepa completo en cualquier ventana.
    const stage = document.getElementById('stage');
    function fit() {
      const s = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();

    // 21 líneas en orden de revelado (line-by-line, 1 s entre cada una).
    const lineas = [
      { h: "¿de qué se están riendo siempre los acapulqueños?", it: true, gap: "sm" },
      { h: "de la basura que se vuelve montaña sobre la avenida, veneno para corales, pesticida rondando las algas" },
      { h: "de la falta que brota hasta del más decoroso turista, sin culpa de la bahía, oleaje que colapsa y explota" },
      { h: "ensoñación paradisiaca donde la sal de la Costera llega, impunidad impregnada en cada hongo marino," },
      { h: "de las peleas entre acapulqueños y defeños en Caleta, batallas desde yopes contra aztecas" },
      { h: "temor en cada célula atravesada por falsas, y falsas guerras, mientras bailan en los clubs" },
      { h: "del golpe de la señora al militar durante la entrega de enceres después del huracán" },
      { h: "de la <i>alucinación, del ego de la IA</i>, del <i>lugar donde los carrizos fueron destruidos</i>" },
      { h: "de la nostalgia por la “Hollywood Gang” que no regresa," },
      { h: "del hallazgo de Tony Camargo en Acapulco Blues." },
      { h: "Decían los petrograbados en Palma Sola", gap: "lg" },
      { h: "el Pacífico no es alberca, es advertencia," },
      { h: "del pescado que no pescan" },
      { h: "del exceso de vitamina D" },
      { h: "del absurdo de la vida" },
      { h: "de nada en particular" },
      { h: "de reprimir el llanto" },
      { h: "de la miseria," },
      { h: "de la abundancia" },
      { h: "escurrida" },
      { h: "de los años 50's." }
    ];
    const STEP = 1000; // 1 segundo entre cada línea

    const poem = document.getElementById('poem');
    lineas.forEach((L, i) => {
      const div = document.createElement('div');
      div.className = 'ln'
        + (L.it ? ' it' : '')
        + (L.gap === 'sm' ? ' gap-sm' : '')
        + (L.gap === 'lg' ? ' gap-lg' : '');
      div.innerHTML = L.h;
      div.style.transitionDelay = (i * STEP) + 'ms';
      poem.appendChild(div);
    });

    requestAnimationFrame(() => {
      requestAnimationFrame(() => poem.classList.add('revealed'));
    });

    // Timón → page5
    document.getElementById('helmBtn').addEventListener('click', function () {
      this.classList.add('go');
      setTimeout(() => { window.location.href = 'page5.html'; }, 500);
    });
  </script>
