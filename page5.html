  <title>Aguamala — Flores de Guerrero</title>

  <!-- Tipografía Roboto para el texto revelado -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* Imagen de fondo: escena submarina (corales, mango, aguacate, flores,
       balas) — se replica EXACTAMENTE igual que el diseño original. */
    .scene > img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }

    /* ── Texto con revelado line-by-line ───────────────────────────────────
       Arriba a la izquierda, centrado. Tipografía Roboto, 21px.
       Cada línea aparece 1 segundo después de la anterior.
    ──────────────────────────────────────────────────────────────────────── */
    .verse {
      position: absolute;
      top: 6%;
      left: 5%;
      font-family: 'Roboto', Arial, Helvetica, sans-serif;
      font-size: 17px;
      line-height: 1.5;
      font-weight: 400;
      color: #ffffff;
      text-align: left;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
      z-index: 10;
      pointer-events: none;
    }
    .verse .line {
      display: block;
      opacity: 0;
      filter: blur(5px);
      transition: opacity 0.7s ease, filter 0.7s ease;
    }
    .verse .line.show {
      opacity: 1;
      filter: blur(0);
    }

    /* Botón timón (idéntico al resto de la serie: blanco con sombra) */
    .helm {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 999;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
    .helm:hover {
      transform: rotate(30deg) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .helm:focus-visible {
      outline: 2px dashed rgba(255,255,255,0.7);
      outline-offset: 5px;
      border-radius: 50%;
    }
    .helm.go {
      animation: helmGo 0.55s ease forwards;
    }
    @keyframes helmGo {
      to { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }
  </style>
