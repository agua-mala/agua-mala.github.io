<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aguamala — Vida inteligente S-500</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* Imagen de fondo: bahía nocturna + medusa bioluminiscente + título
       "Vida inteligente S-500" (el texto va incrustado en la propia
       composición; se replica EXACTAMENTE, sin efecto de revelado). */
    .scene > img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }

    /* Botón timón (idéntico al resto de la serie: blanco con sombra) */
    .helm {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 999;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
    .helm:hover {
      transform: rotate(30deg) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .helm:focus-visible {
      outline: 2px dashed rgba(255,255,255,0.7);
      outline-offset: 5px;
      border-radius: 50%;
    }
    .helm.go {
      animation: helmGo 0.55s ease forwards;
    }
    @keyframes helmGo {
      to { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }
  </style>

  <!--
    ZONA DEL POEMA SECRETO
    Buenos muchachos
    VI.-
    la telaraña columpia en el puente
    crismas que alguna vez no fueron
    brazos, manos, piernas, sin cuerpo
    el envejecido mar ruge de nuevo,
    días colorados
    partidas arrambladas
    rostros anestesiados
    esperanzas mordisqueadas en la colación del día.
  -->

</head>
